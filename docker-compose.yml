services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: stocks
    ports: ["5432:5432"]
    volumes:
      - tsdb_data:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://app:app@timescaledb:5432/stocks
      # add ALPACA_KEY / ALPACA_SECRET via .env (below)
    env_file: .env
    depends_on:
      - redis
      - timescaledb
    ports: ["8000:8000"]
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://app:app@timescaledb:5432/stocks
    env_file: .env
    depends_on:
      - redis
      - timescaledb
    command: celery -A app.celery_app worker --loglevel=INFO
    volumes:
      - ./backend:/app

  flower:
    image: mher/flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    ports: ["5555:5555"]

  frontend:
    build: ./frontend
    depends_on:
      - api
    ports: ["3000:3000"]
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  redis_data:
  tsdb_data: